name: Build Server

on:
  push:
    paths:
      - 'server/**'
      - '.github/workflows/build_server.yml'
  pull_request:
    paths:
      - 'server/**'
  workflow_dispatch:

jobs:
  build:
    name: Build & Test Server
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pixez
          POSTGRES_PASSWORD: pixez_test
          POSTGRES_DB: pixez_sync
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        working-directory: server
        run: cargo fmt --check

      - name: Clippy lint
        working-directory: server
        run: cargo clippy -- -D warnings

      - name: Build
        working-directory: server
        run: cargo build --release
        env:
          DATABASE_URL: postgres://pixez:pixez_test@localhost:5432/pixez_sync
          JWT_SECRET: ci-test-secret-do-not-use-in-production

      - name: Run tests
        working-directory: server
        run: cargo test --release
        env:
          DATABASE_URL: postgres://pixez:pixez_test@localhost:5432/pixez_sync
          JWT_SECRET: ci-test-secret-do-not-use-in-production
