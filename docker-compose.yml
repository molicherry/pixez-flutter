services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data

  api:
    build: ./server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${DB_USER:-pixez}:${DB_PASS:-pixez}@db:5432/${DB_NAME:-pixez_sync}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-pixez}
      POSTGRES_PASSWORD: ${DB_PASS:-pixez}
      POSTGRES_DB: ${DB_NAME:-pixez_sync}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pixez} -d ${DB_NAME:-pixez_sync}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  caddy_data:
